<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; font-family: sans-serif; }

  .toolbar {
    padding: 10px;
    background: #eee;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #ccc;
    text-align: center;
    padding: 5px;
  }

  canvas {
    width: 100%;
    height: 120px;
    display: block;
    border: 1px solid black;
    touch-action: none;
  }

  canvas.active {
    border: 2px solid red;
  }

  .pagination {
    text-align: center;
    padding: 10px;
  }

  button {
    margin: 3px;
  }
</style>
</head>

<body>

<div class="toolbar">
  <input type="file" id="fileInput" accept=".json">
  <br><br>

  <button onclick="setMode('pen')">Pen</button>
  <button onclick="setMode('eraser')">Eraser</button>
  <button onclick="clearActiveCanvas()">Clear</button>

  <br><br>

  <label>Size: <span id="sizeLabel">10</span></label>
  <input type="range" id="brushSize" min="1" max="30" value="10">
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>Kanji</th>
      <th>Write</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div class="pagination">
  <button onclick="prevPage()">Prev</button>
  <span id="pageInfo"></span>
  <button onclick="nextPage()">Next</button>
</div>

<script>
let kanjiData = [];
let currentPage = 1;
const perPage = 5;

let canvases = [];
let activeCanvas = null;

let mode = "pen";
let brushSize = 10;

// 🎚️ brush
const brushSlider = document.getElementById("brushSize");
const sizeLabel = document.getElementById("sizeLabel");

brushSlider.addEventListener("input", () => {
  brushSize = parseInt(brushSlider.value);
  sizeLabel.innerText = brushSize;
});

// 📂 load JSON
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      kanjiData = JSON.parse(evt.target.result);
      currentPage = 1;
      renderTable();
    } catch(err) {
      alert("Format JSON salah");
    }
  };
  reader.readAsText(file);
});

// 📊 render
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  canvases = [];

  const start = (currentPage - 1) * perPage;
  const pageData = kanjiData.slice(start, start + perPage);

  pageData.forEach((item, index) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${start + index + 1}</td>
      <td style="font-size:28px;">${item.kanji}</td>
      <td><canvas></canvas></td>
    `;

    tbody.appendChild(tr);

    const canvas = tr.querySelector("canvas");
    setupCanvas(canvas);
    canvases.push(canvas);
  });

  updatePageInfo();
}

// 📄 info
function updatePageInfo() {
  const totalPages = Math.ceil(kanjiData.length / perPage) || 1;
  document.getElementById("pageInfo").innerText =
    `Page ${currentPage} / ${totalPages}`;
}

// ⬅️➡️
function nextPage() {
  const totalPages = Math.ceil(kanjiData.length / perPage);
  if (currentPage < totalPages) {
    currentPage++;
    renderTable();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    renderTable();
  }
}

// 🎯 coord
function getPos(canvas, e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

// 🧠 canvas
function setupCanvas(canvas) {
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let drawing = false;

  // 🎯 set active canvas
  function setActive(c) {
    canvases.forEach(cv => cv.classList.remove("active"));
    c.classList.add("active");
    activeCanvas = c;
  }

  canvas.addEventListener("pointerdown", (e) => {
    drawing = true;
    setActive(canvas);

    const pos = getPos(canvas, e);

    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);

    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener("pointerenter", () => setActive(canvas));

  canvas.addEventListener("pointerup", stopDraw);
  canvas.addEventListener("pointerleave", stopDraw);

  function stopDraw() {
    drawing = false;
    ctx.beginPath();
  }

  canvas.addEventListener("pointermove", (e) => {
    if (!drawing) return;

    const pos = getPos(canvas, e);

    let p = e.pressure;
    if (p === 0) p = 0.5;

    const size = Math.max(1, brushSize * (0.2 + p));
    ctx.lineWidth = size;

    if (mode === "pen") {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = "#000";
    } else {
      ctx.globalCompositeOperation = "destination-out";
    }

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  });

  canvas._ctx = ctx;
}

// 🎨 mode
function setMode(m) {
  mode = m;
}

// 🧹 clear hanya canvas aktif
function clearActiveCanvas() {
  if (!activeCanvas) return;

  const ctx = activeCanvas._ctx;
  ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
  ctx.beginPath();
  ctx.globalCompositeOperation = "source-over";
}
</script>

</body>
</html>
